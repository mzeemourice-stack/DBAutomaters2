<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA Terminal | High-Frequency Systems</title>
    <style>
        :root { 
            --neon-yellow: #fefe00;
            --neon-lime: #39ff14;
            --neon-blue: #00d2ff;
            --dark-bg: #050505;
        }

        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* 1. BACKGROUND GLOW EFFECTS */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(57, 255, 20, 0.05) 0%, transparent 30%),
                        radial-gradient(circle at 90% 90%, rgba(0, 210, 255, 0.05) 0%, transparent 30%);
            z-index: -1;
        }

        /* 2. THE MAIN BRAND PILL (LOGO) */
        .brand-pill {
            padding: 18px 50px; border: 2px solid var(--neon-yellow); border-radius: 50px;
            color: var(--neon-yellow); font-weight: 900; font-size: 2.5rem;
            letter-spacing: 5px; text-transform: uppercase; background: rgba(254, 254, 0, 0.03);
            box-shadow: 0 0 25px rgba(254, 254, 0, 0.4); margin-bottom: 15px;
            animation: float 4s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(254, 254, 0, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 25px rgba(254, 254, 0, 0.4); }
            50% { transform: translateY(-12px) scale(1.02); box-shadow: 0 0 45px rgba(254, 254, 0, 0.6); }
        }

        .subtitle { 
            font-size: 0.8rem; color: var(--neon-blue); letter-spacing: 8px; 
            text-transform: uppercase; margin-bottom: 50px; font-weight: bold;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        /* 3. INSTITUTIONAL STATS (LIME GREEN ACCENTS) */
        .stats-row {
            display: flex; gap: 60px; margin-bottom: 60px;
        }
        .stat-box { text-align: center; position: relative; }
        .stat-value { 
            font-size: 2rem; font-weight: 900; color: white; display: block; 
            transition: 0.3s; cursor: default;
        }
        .stat-box:hover .stat-value { color: var(--neon-lime); transform: translateY(-5px); }
        .stat-label { 
            font-size: 0.65rem; color: var(--neon-lime); letter-spacing: 2px; 
            text-transform: uppercase; margin-top: 8px; font-weight: 800;
        }

        /* 4. NAVIGATION PILLS */
        .btn-container { display: flex; gap: 30px; }
        
        .pill-btn {
            text-decoration: none; padding: 14px 45px; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.95rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block; position: relative; overflow: hidden;
        }

        /* Access Portal (Yellow/Lime Glow) */
        .btn-main {
            background: var(--neon-yellow); color: black;
            box-shadow: 0 0 20px rgba(254, 254, 0, 0.5);
            border: 2px solid var(--neon-yellow);
        }
        .btn-main:hover {
            transform: scale(1.15); background: var(--neon-lime); 
            border-color: var(--neon-lime); box-shadow: 0 0 40px rgba(57, 255, 20, 0.8);
        }

        /* Documentation (Blue Outline Glow) */
        .btn-sec {
            border: 2px solid var(--neon-blue); color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        .btn-sec:hover {
            transform: scale(1.1); color: white; background: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
        }

        footer { 
            position: absolute; bottom: 30px; font-size: 0.65rem; 
            color: #333; letter-spacing: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="brand-pill">DB EA TERMINAL</div>
    <div class="subtitle">Next-Gen Execution Engine</div>

    <div class="stats-row">
        <div class="stat-box">
            <span class="stat-value">250K++</span>
            <span class="stat-label">Total Volume</span>
        </div>
        <div class="stat-box">
            <span class="stat-value">50.0K++</span>
            <span class="stat-label">Active Nodes</span>
        </div>
        <div class="stat-box">
            <span class="stat-value">99.99%</span>
            <span class="stat-label">Server Uptime</span>
        </div>
    </div>

    <div class="btn-container">
        <a href="login.html" class="pill-btn btn-main">Access Portal</a>
        <a href="#" class="pill-btn btn-sec">Documentation</a>
    </div>

    <footer>V2.6.0 | ENCRYPTED TERMINAL ACCESS</footer>

</body>
</html>
