<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA Terminal | Institutional Access</title>
    <style>
        :root { 
            --neon-yellow: #fefe00;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. THE MAIN BRAND PILL (LOGO) */
        .brand-pill {
            padding: 15px 40px;
            border: 2px solid var(--neon-yellow);
            border-radius: 50px;
            color: var(--neon-yellow);
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: rgba(254, 254, 0, 0.05);
            box-shadow: 0 0 20px rgba(254, 254, 0, 0.4);
            margin-bottom: 25px;
            animation: hoverAnim 3s infinite ease-in-out;
            cursor: default;
        }

        @keyframes hoverAnim {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 20px rgba(254, 254, 0, 0.4); }
            50% { transform: translateY(-10px); box-shadow: 0 0 35px rgba(254, 254, 0, 0.7); }
        }

        h1 {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* 2. THE NAVIGATION PILLS (BUTTONS) */
        .pill-container {
            display: flex;
            gap: 25px;
        }

        .nav-pill {
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        /* YELLOW ACTION PILL */
        .pill-yellow {
            background: var(--neon-yellow);
            color: black;
            box-shadow: 0 0 15px rgba(254, 254, 0, 0.5);
            border: 2px solid var(--neon-yellow);
        }

        .pill-yellow:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(254, 254, 0, 0.8);
        }

        /* OUTLINE PILL */
        .pill-outline {
            border: 2px solid #333;
            color: #888;
        }

        .pill-outline:hover {
            border-color: #fefe00;
            color: #fefe00;
            box-shadow: 0 0 15px rgba(254, 254, 0, 0.3);
        }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="brand-pill">DB EA TERMINAL</div>
    <h1>Institutional Trading Infrastructure</h1>

    <div class="pill-container">
        <a href="login.html" class="nav-pill pill-yellow">Access Portal</a>
        <a href="#" class="nav-pill pill-outline">System Docs</a>
    </div>

    <footer>CORE ENGINE V2.0 | SECURE CONNECT</footer>

</body>
</html>
