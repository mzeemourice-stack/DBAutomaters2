<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Institutional Trading</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-sky: #00ebff;
            --neon-green: #39ff14;
            --neon-yellow: rgba(254, 254, 0, 0.8);
            --neon-yellow-glow: #fefe00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow: hidden;
        }

        /* Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('174830.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(10,10,10,0.6) 0%, rgba(0,0,0,0.9) 100%);
        }

        /* Top Left Section */
        .top-left-section {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
        }

        .header-box {
            padding: 8px 18px;
            border: 2px solid var(--neon-green);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--neon-green);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: inline-block;
        }

        .sub-header-box {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--neon-sky);
            box-shadow: 0 0 15px var(--neon-sky);
            animation: bounceLoop 2.5s infinite ease-in-out;
            background: rgba(0, 0, 0, 0.6);
            font-size: 0.85rem;
            display: block;
        }

        /* Main Center Content */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .trusted-pill-main {
            background: rgba(57, 255, 20, 0.1);
            padding: 5px 20px;
            border-radius: 50px;
            border: 1px solid var(--neon-green);
            font-size: 0.8rem;
            margin-bottom: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .main-logo {
            font-size: 4.5rem;
            font-weight: 800;
            animation: slowBounce 4s infinite ease-in-out;
            margin: 0;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            margin-top: 10px;
            text-transform: uppercase;
            color: #ccc;
        }

        /* Floating Stats Pill Container */
        .stats-pill-container {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            padding: 15px 45px;
            border-radius: 50px;
            border: 1.5px solid rgba(57, 255, 20, 0.4);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: float 6s infinite ease-in-out;
            align-items: center;
        }

        .stat-group { display: flex; flex-direction: column; }
        .stat-value { color: #fefe00; font-size: 1.5rem; font-weight: 700; }
        .stat-desc { font-size: 0.65rem; text-transform: lowercase; opacity: 0.7; }

        /* Interactive Buttons */
        .btn-pill {
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            cursor: pointer;
            display: inline-block;
        }

        .start-btn {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
        }

        .start-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .login-btn {
            background: rgba(254, 254, 0, 0.15);
            border: 1px solid var(--neon-yellow-glow);
            color: var(--neon-yellow-glow);
            margin-top: 25px;
        }

        .login-btn:hover {
            background: var(--neon-yellow-glow);
            color: black;
            box-shadow: 0 0 25px var(--neon-yellow-glow);
            transform: scale(1.05);
        }

        /* Helpers & Animations */
        .green { color: var(--neon-green); }
        .blue { color: var(--neon-blue); }
        .glow-uptime { text-shadow: 0 0 10px var(--neon-green); }
        .sky-split {
            background: linear-gradient(90deg, var(--neon-green) 50%, var(--neon-sky) 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes bounceLoop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        @keyframes slowBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>

    <div class="bg-container"><div class="overlay"></div></div>

    <div class="top-left-section">
        <div class="header-box"><span class="green">DB</span><span class="blue">Automater</span></div>
        <div class="sub-header-box"><span class="sky-split">Institutional Precision II Smart Automate Trades</span></div>
    </div>

    <div class="main-content">
        <div class="trusted-pill-main">trusted by +50,000 traders globally</div>
        
        <h1 class="main-logo"><span class="green">DB</span><span class="blue">Automaters</span></h1>
        <div class="tagline">The future is automate trading with Our performance Expert Advisors</div>

        <div class="stats-pill-container">
            <div class="stat-group">
                <span class="stat-value">+50.0K</span>
                <span class="stat-desc">live traders</span>
            </div>
            <div class="stat-group">
                <span class="stat-value">+2.8B ++</span>
                <span class="stat-desc">trading volume</span>
            </div>
            <div class="stat-group">
                <span class="stat-value glow-uptime">99.99%</span>
                <span class="stat-desc">uptime</span>
            </div>
            <a href="trading.html" class="btn-pill start-btn">start trading now</a>
        </div>

        <div id="login-trigger" class="btn-pill login-btn">Login Now</div>
    </div>

    <script>
        // Your Firebase Configuration
        const firebaseConfig = {
          apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
          authDomain: "dbautomaters.firebaseapp.com",
          projectId: "dbautomaters",
          storageBucket: "dbautomaters.firebasestorage.app",
          messagingSenderId: "979994954651",
          appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Handle Login Click
        document.getElementById('login-trigger').onclick = function() {
            // This will redirect to your specific Firebase Auth Domain
            window.location.href = "https://" + firebaseConfig.authDomain + "/login";
            
            // NOTE: If you have a specific custom page for account creation, 
            // you can change the URL above to that link.
        };
    </script>
</body>
</html>
