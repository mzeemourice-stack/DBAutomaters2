<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Institutional Precision</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Top Left Header Box */
        .top-left-box {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            box-shadow: 0 0 10px var(--neon-green), inset 0 0 5px var(--neon-blue);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .text-green { color: var(--neon-green); }
        .text-blue { color: var(--neon-blue); }

        /* Secondary Header Box with Bouncing Loop */
        .sub-header-box {
            position: absolute;
            top: 85px;
            left: 20px;
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid white;
            box-shadow: 0 0 15px white;
            animation: bounceLoop 3s infinite ease-in-out;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .split-text {
            background: linear-gradient(to right, var(--neon-green) 50%, var(--neon-blue) 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Center Content */
        .main-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Trusted Pill Shape */
        .trusted-pill {
            background: rgba(57, 255, 20, 0.2);
            padding: 6px 20px;
            border-radius: 50px; /* This creates the Pill shape */
            border: 1px solid var(--neon-green);
            font-size: 0.85rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .trusted-pill:hover {
            background: rgba(57, 255, 20, 0.4);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Main Bouncing Logo */
        .main-logo {
            font-size: 4rem;
            font-weight: 900;
            animation: slowBounce 4s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* Animations */
        @keyframes bounceLoop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes slowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="top-left-box">
        <span class="text-green">DB</span><span class="text-blue">Automater</span>
    </div>

    <div class="sub-header-box">
        <span class="split-text">Institutional Precision II Smart Automate Trades</span>
    </div>

    <div class="main-container">
        <div class="trusted-pill">
            Trusted by +50,000 traders globally
        </div>
        
        <div class="main-logo">
            <span class="text-green">DB</span><span class="text-blue">Automaters</span>
        </div>
    </div>

</body>
</html>
