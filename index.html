<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA Terminal | High-Frequency Systems</title>
    <style>
        :root { 
            --neon-yellow: #fefe00; --neon-lime: #39ff14; --neon-blue: #00d2ff; --dark-bg: #050505;
        }

        body {
            margin: 0; padding: 0; background: var(--dark-bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }

        .wrapper { width: 90%; max-width: 1200px; text-align: center; display: flex; flex-direction: column; align-items: center; }

        /* BRAND PILL */
        .brand-pill {
            padding: 1rem 3rem; border: 2px solid var(--neon-yellow); border-radius: 50px;
            color: var(--neon-yellow); font-weight: 900; font-size: clamp(1.5rem, 5vw, 2.5rem);
            letter-spacing: 5px; text-transform: uppercase; background: rgba(254, 254, 0, 0.03);
            box-shadow: 0 0 25px rgba(254, 254, 0, 0.4); margin-bottom: 1rem;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); box-shadow: 0 0 45px rgba(254, 254, 0, 0.6); }
        }

        .subtitle { font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 3rem; font-weight: bold; }

        /* STATS GRID */
        .stats-row { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-bottom: 4rem; width: 100%; max-width: 800px; }
        @media (min-width: 768px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }

        .stat-box { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 900; color: white; display: block; }
        .stat-label { font-size: 0.6rem; color: var(--neon-lime); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* BUTTONS */
        .btn-container { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 300px; }
        @media (min-width: 600px) { .btn-container { flex-direction: row; max-width: none; justify-content: center; } }
        
        .pill-btn {
            text-decoration: none; padding: 1rem 3.5rem; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.9rem; transition: 0.3s; text-align: center;
        }

        .btn-main { background: var(--neon-yellow); color: black; box-shadow: 0 0 20px rgba(254, 254, 0, 0.3); border: 2px solid var(--neon-yellow); }
        .btn-main:hover { transform: scale(1.05); background: var(--neon-lime); border-color: var(--neon-lime); }

        .btn-sec { border: 2px solid #333; color: #888; }
        .btn-sec:hover { color: var(--neon-blue); border-color: var(--neon-blue); }

        footer { margin-top: 4rem; font-size: 0.6rem; color: #333; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="brand-pill">DB EA TERMINAL</div>
        <div class="subtitle">Institutional Deriv Infrastructure</div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-value">250K++</span>
                <span class="stat-label">Volume Traded</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">50.0K++</span>
                <span class="stat-label">Active Nodes</span>
            </div>
            <div class="stat-box">
                <span class="stat-value">99.99%</span>
                <span class="stat-label">Server Uptime</span>
            </div>
        </div>

        <div class="btn-container">
            <a href="login.html" class="pill-btn btn-main">Access Portal</a>
            <a href="#" class="pill-btn btn-sec">Documentation</a>
        </div>
    </div>
    <footer>V2.6.0 | ENCRYPTED CONNECT</footer>
</body>
</html>
