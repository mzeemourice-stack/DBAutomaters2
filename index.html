<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Home</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-sky: #00ebff;
            --neon-green: #39ff14;
            --neon-yellow: #fefe00;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background: #000 url('174830.jpg') no-repeat center center/cover;
            color: white; overflow: hidden;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%);
            z-index: 1;
        }

        /* Top Left Branding */
        .brand-area { position: absolute; top: 25px; left: 25px; z-index: 10; }
        .box-main {
            padding: 8px 18px; border: 2px solid var(--neon-green); border-radius: 10px;
            box-shadow: 0 0 15px var(--neon-green); font-weight: 800; display: inline-block;
            background: rgba(0,0,0,0.5); margin-bottom: 10px;
        }
        .box-sub {
            padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--neon-sky);
            box-shadow: 0 0 15px var(--neon-sky); animation: bounceLoop 3s infinite ease-in-out;
            background: rgba(0,0,0,0.7); font-size: 0.8rem; display: block;
        }

        /* Center Content */
        .hero {
            position: relative; z-index: 2; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .trusted-pill {
            background: rgba(57, 255, 20, 0.1); padding: 6px 20px; border-radius: 50px;
            border: 1px solid var(--neon-green); font-size: 0.8rem; margin-bottom: 10px;
            transition: 0.3s; cursor: pointer;
        }
        .trusted-pill:hover { background: rgba(57, 255, 20, 0.3); box-shadow: 0 0 20px var(--neon-green); }

        .logo { font-size: 4.5rem; font-weight: 900; animation: slowBounce 5s infinite ease-in-out; margin: 0; }
        .tagline { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #ccc; margin-top: 10px; }

        /* Stats Floating Pill */
        .stats-pill {
            display: flex; gap: 30px; margin-top: 35px; padding: 15px 40px;
            border-radius: 50px; border: 1.5px solid rgba(57, 255, 20, 0.4);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            animation: floatUI 6s infinite ease-in-out; align-items: center;
        }
        .stat-group { display: flex; flex-direction: column; }
        .val { color: var(--neon-yellow); font-size: 1.4rem; font-weight: 800; }
        .desc { font-size: 0.6rem; text-transform: lowercase; opacity: 0.7; }

        .btn-start {
            text-decoration: none; padding: 10px 25px; border-radius: 50px;
            background: var(--neon-green); color: black; font-weight: bold;
            margin-left: 15px; box-shadow: 0 0 15px var(--neon-green);
        }

        .login-link {
            background: rgba(254, 254, 0, 0.15); border: 1px solid var(--neon-yellow);
            color: var(--neon-yellow); padding: 10px 30px; border-radius: 50px;
            margin-top: 25px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .login-link:hover { background: var(--neon-yellow); color: black; box-shadow: 0 0 20px var(--neon-yellow); }

        /* Helpers & Anims */
        .grn { color: var(--neon-green); } .blu { color: var(--neon-blue); }
        .split { background: linear-gradient(90deg, var(--neon-green) 50%, var(--neon-sky) 50%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes bounceLoop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        @keyframes slowBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes floatUI { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="brand-area">
        <div class="box-main"><span class="grn">DB</span><span class="blu">Automater</span></div>
        <div class="box-sub"><span class="split">Institutional Precision II Smart Automate Trades</span></div>
    </div>

    <div class="hero">
        <div class="trusted-pill">trusted by +50,000 traders globally</div>
        <h1 class="logo"><span class="grn">DB</span><span class="blu">Automaters</span></h1>
        <p class="tagline">The future is automate trading with Our performance Expert Advisors</p>

        <div class="stats-pill">
            <div class="stat-group"><span class="val">+50.0K</span><span class="desc">live traders</span></div>
            <div class="stat-group"><span class="val">+2.8B ++</span><span class="desc">trading volume</span></div>
            <div class="stat-group"><span class="val" style="text-shadow: 0 0 10px var(--neon-green);">99.99%</span><span class="desc">uptime</span></div>
            <a href="trading.html" class="btn-start">start trading now</a>
        </div>

        <a href="login.html" class="login-link">Login Now</a>
    </div>
</body>
</html>
