<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Secure Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --neon-green: #39ff14; --neon-blue: #00d2ff; }
        body { margin: 0; background: #050505 url('174830.jpg') no-repeat center center/cover; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1; }
        
        .login-card { position: relative; z-index: 2; background: rgba(15, 15, 15, 0.95); padding: 35px; border-radius: 20px; border: 1px solid var(--neon-green); width: 360px; text-align: center; box-shadow: 0 0 30px rgba(57, 255, 20, 0.2); }
        h2 { color: var(--neon-blue); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon-blue); }
        
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-email { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }
        .btn-phone { background: var(--neon-blue); color: black; margin-top: 15px; }
        .btn-google { background: white; color: #444; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.85rem; }
        
        #recaptcha-container { margin-top: 10px; }
        .divider { margin: 25px 0; border: 0.5px solid #222; position: relative; }
        .divider::after { content: "OR"; position: absolute; top: -10px; left: 45%; background: #0f0f0f; padding: 0 10px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="login-card">
        <h2>Terminal Access</h2>
        
        <input type="email" id="userEmail" placeholder="Email Address">
        <input type="password" id="userPassword" placeholder="Password">
        <button class="btn btn-email" onclick="handleEmailAuth()">Login / Sign Up</button>
        
        <div class="divider"></div>

        <input type="text" id="userPhone" placeholder="+254 700 000 000">
        <div id="recaptcha-container"></div>
        <button class="btn btn-phone" onclick="handlePhoneAuth()">Verify Phone</button>

        <button class="btn btn-google" onclick="handleGoogleAuth()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google
        </button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
          authDomain: "dbautomaters.firebaseapp.com",
          projectId: "dbautomaters",
          storageBucket: "dbautomaters.firebasestorage.app",
          messagingSenderId: "979994954651",
          appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        // Full URL Redirect to solve GitHub Pages subfolder issues
        const REDIRECT_URL = "https://mzeemourice-stack.github.io/DBAutomaters2/trading.html";

        // 1. Email/Password Auth
        function handleEmailAuth() {
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value;

            if(!email || !password) return alert("Fill in all fields");

            auth.signInWithEmailAndPassword(email, password)
                .then(() => window.location.href = REDIRECT_URL)
                .catch(() => {
                    // If login fails, try to create an account instead
                    auth.createUserWithEmailAndPassword(email, password)
                        .then(() => window.location.href = REDIRECT_URL)
                        .catch(err => alert(err.message));
                });
        }

        // 2. Google Auth
        function handleGoogleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => window.location.href = REDIRECT_URL)
                .catch(err => alert(err.message));
        }

        // 3. Phone Auth
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
        
        function handlePhoneAuth() {
            const phoneNumber = document.getElementById('userPhone').value.trim();
            if(!phoneNumber) return alert("Enter phone number with +country code");

            auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    const code = prompt("Enter the 6-digit SMS code sent to your phone:");
                    confirmationResult.confirm(code)
                        .then(() => window.location.href = REDIRECT_URL)
                        .catch(err => alert("Wrong code: " + err.message));
                })
                .catch(err => alert("Phone Error: " + err.message));
        }
    </script>
</body>
</html>
