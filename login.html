<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA | Terminal Access</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { 
            --neon-yellow: #fefe00;
            --neon-lime: #39ff14;
            --neon-blue: #00d2ff;
            --dark-bg: #050505;
        }

        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Inter', sans-serif; display: flex;
            align-items: center; justify-content: center; height: 100vh;
        }

        /* THE GLOWING CARD */
        .auth-card {
            width: 380px; padding: 40px; background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--neon-lime); border-radius: 25px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.15); text-align: center;
        }

        .auth-pill {
            display: inline-block; padding: 8px 25px; border: 2px solid var(--neon-yellow);
            border-radius: 50px; color: var(--neon-yellow); font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(254, 254, 0, 0.3);
        }

        h2 { color: var(--neon-blue); font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            border-radius: 12px; color: white; transition: 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: var(--neon-blue); outline: none; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        /* THE CLICKABLE PILLS */
        .btn-auth {
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; margin-top: 15px; transition: 0.4s;
        }
        .btn-login { 
            background: var(--neon-lime); color: black; 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); 
        }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(57, 255, 20, 0.6); }

        .btn-google {
            background: white; color: #555; font-size: 0.8rem; margin-top: 10px;
        }

        .toggle-text {
            margin-top: 20px; font-size: 0.8rem; color: #888; cursor: pointer;
            transition: 0.3s; display: block;
        }
        .toggle-text span { color: var(--neon-blue); font-weight: bold; text-decoration: underline; }
        .toggle-text:hover span { color: var(--neon-yellow); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-pill">DB EA TERMINAL</div>
        <h2 id="auth-title">TERMINAL ACCESS</h2>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button class="btn-auth btn-login" id="auth-btn" onclick="handleAuth()">Login / Sign Up</button>
        
        <div style="margin: 20px 0; color: #444; font-size: 0.7rem;">OR</div>

        <button class="btn-auth btn-google" onclick="googleSignIn()">CONTINUE WITH GOOGLE</button>

        <a class="toggle-text" onclick="toggleMode()">
            Don't have an account? <span id="toggle-link">Sign Up</span>
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let isSignUp = false;

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "CREATE ACCOUNT" : "TERMINAL ACCESS";
            document.getElementById('auth-btn').innerText = isSignUp ? "REGISTER NOW" : "LOGIN / SIGN UP";
            document.getElementById('toggle-link').innerText = isSignUp ? "Login" : "Sign Up";
            document.querySelector('.toggle-text').firstChild.textContent = isSignUp ? "Already have an account? " : "Don't have an account? ";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!email || !pass) return alert("Please fill all fields");

            try {
                if(isSignUp) {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    alert("Account Created Successfully!");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                window.location.href = "trading.html";
            } catch (error) {
                alert(error.message);
            }
        }

        function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => window.location.href = "trading.html")
                .catch(err => alert(err.message));
        }
    </script>
</body>
</html>
