<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBAutomaters | Member Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .card { background: rgba(20, 20, 20, 0.8); padding: 40px; border-radius: 20px; border: 1px solid #39ff14; width: 340px; text-align: center; box-shadow: 0 0 30px rgba(57, 255, 20, 0.1); }
        h2 { color: #00d2ff; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn { background: #39ff14; color: black; }
        .signup-btn { background: transparent; color: #00d2ff; border: 1px solid #00d2ff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Member Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn login-btn" onclick="login()">LOGIN</button>
        <button class="btn signup-btn" onclick="signup()">CREATE ACCOUNT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signup() {
            auth.createUserWithEmailAndPassword(email.value, password.value)
                .then(() => window.location.href = "/DBAutomaters2/trading.html")
                .catch(err => alert(err.message));
        }

        function login() {
            auth.signInWithEmailAndPassword(email.value, password.value)
                .then(() => window.location.href = "/DBAutomaters2/trading.html")
                .catch(err => alert(err.message));
        }
    </script>
</body>
</html>
