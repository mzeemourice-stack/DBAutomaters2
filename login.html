<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Member Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            background: #050505 url('174830.jpg') no-repeat center center/cover;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Darkening Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
            width: 350px;
            text-align: center;
        }

        h2 { 
            margin-bottom: 30px; 
            color: var(--neon-blue); 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: var(--glass);
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn { 
            background: var(--neon-green); 
            color: black; 
            box-shadow: 0 0 15px var(--neon-green);
        }

        .signup-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 1.5px solid var(--neon-blue);
            margin-top: 15px;
        }

        .btn:hover { 
            transform: translateY(-3px); 
            opacity: 0.9;
        }
        
        .footer-links {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="login-card">
        <h2>Member Portal</h2>
        
        <input type="email" id="userEmail" placeholder="Email Address">
        <input type="password" id="userPassword" placeholder="Password">
        
        <button class="btn login-btn" onclick="handleLogin()">Login</button>
        <button class="btn signup-btn" onclick="handleSignUp()">Create Account</button>
        
        <div class="footer-links">
            Secured by DBAutomaters Cloud
        </div>
    </div>

    <script>
        // Your Verified Firebase Configuration
        const firebaseConfig = {
          apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
          authDomain: "dbautomaters.firebaseapp.com",
          projectId: "dbautomaters",
          storageBucket: "dbautomaters.firebasestorage.app",
          messagingSenderId: "979994954651",
          appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // FIX: Getting values via document.getElementById is the most reliable way
        function handleSignUp() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Account Created! Redirecting...");
                    window.location.href = "trading.html";
                })
                .catch((error) => {
                    alert(error.message);
                });
        }

        function handleLogin() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Success! Go to trading terminal
                    window.location.href = "trading.html";
                })
                .catch((error) => {
                    alert("Login failed: " + error.message);
                });
        }
    </script>
</body>
</html>
