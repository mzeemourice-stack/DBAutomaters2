<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA ACCESS | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0d1117; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .access-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 380px; padding: 40px; text-align: center; backdrop-filter: blur(10px); }
        .brand-title { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 30px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: transparent; color: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .social-btn:hover { background: rgba(255, 255, 255, 0.05); }
        .divider { color: #666; font-size: 0.7rem; letter-spacing: 1px; margin: 20px 0; font-weight: bold; }
        .input-box { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        .btn-initialize { width: 100%; padding: 16px; background: #fefe00; color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
        #status-msg { font-size: 0.7rem; margin-top: 15px; color: #fefe00; display: none; }
    </style>
</head>
<body>

    <div class="access-card">
        <div class="brand-title">DB EA ACCESS</div>

        <button class="social-btn" id="appleBtn">
            <i class="fa-brands fa-apple"></i> Sign In with Apple
        </button>
        <button class="social-btn" id="googleBtn">
            <i class="fa-brands fa-google" style="color: #ea4335;"></i> Sign In with Google
        </button>

        <div class="divider">OR USE TERMINAL KEY</div>

        <input type="text" id="instID" class="input-box" placeholder="Institutional ID">
        <input type="password" id="termKey" class="input-box" placeholder="Terminal Key">

        <button class="btn-initialize" id="loginBtn">Initialize Session</button>
        <div id="status-msg">Processing secure link...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, OAuthProvider, signInWithPopup, signInWithEmailAndPassword } 
        from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // Your Confirmed Config
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const showStatus = (msg) => {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.style.display = 'block';
        };

        // Google Handler
        document.getElementById('googleBtn').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            showStatus("Redirecting to Google...");
            signInWithPopup(auth, provider)
                .then(() => window.location.href = "trading.html")
                .catch((err) => showStatus("Error: " + err.message));
        });

        // Apple Handler
        document.getElementById('appleBtn').addEventListener('click', () => {
            const provider = new OAuthProvider('apple.com');
            showStatus("Redirecting to Apple...");
            signInWithPopup(auth, provider)
                .then(() => window.location.href = "trading.html")
                .catch((err) => showStatus("Error: " + err.message));
        });

        // ID/Key Handler
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('instID').value + "@dbautomaters.com";
            const password = document.getElementById('termKey').value;
            showStatus("Verifying Terminal Key...");
            signInWithEmailAndPassword(auth, email, password)
                .then(() => window.location.href = "trading.html")
                .catch((err) => showStatus("Invalid ID or Terminal Key"));
        });
    </script>
</body>
</html>
