<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBAutomaters | Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body style="background:#000; color:#39ff14; font-family:sans-serif; margin:0;">
    <div id="loading" style="height:100vh; display:flex; align-items:center; justify-content:center;">Verifying Access...</div>

    <div id="content" style="display:none;">
        <div style="padding:15px; background:#111; border-bottom:1px solid #39ff14; display:flex; justify-content:space-between; align-items:center;">
            <span>DB TERMINAL</span>
            <button onclick="firebase.auth().signOut()" style="background:#ff4444; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">SIGN OUT</button>
        </div>
        <div id="chart" style="height:calc(100vh - 60px);"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                // Load TradingView
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "NASDAQ:TSLA",
                    "interval": "D",
                    "theme": "dark",
                    "container_id": "chart"
                });
            } else {
                window.location.href = "/DBAutomaters2/login.html";
            }
        });
    </script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</body>
</html>
