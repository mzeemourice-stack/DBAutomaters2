<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBAutomaters | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-deep: #020202; 
            --neon-blue: #00d2ff; 
            --neon-yellow: #fefe00; 
            --neon-lime: #39ff14;
            --pill-dark: #0f0f0f;
        }

        body { 
            margin: 0; background: var(--bg-deep); color: white; 
            font-family: 'Inter', sans-serif; height: 100vh;
        }

        /* --- MOBILE-FRIENDLY NAVIGATION --- */
        .nav-container {
            display: flex; overflow-x: auto; gap: 10px; padding: 15px;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }
        .nav-pill {
            flex: 0 0 auto; padding: 10px 20px; border-radius: 50px; background: var(--pill-dark);
            color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 10px;
            border: 1px solid #222; cursor: pointer; text-transform: uppercase;
        }
        .nav-pill.active { border-color: var(--neon-yellow); color: var(--neon-yellow); }

        /* --- RESPONSIVE WORKSPACE --- */
        .workspace { 
            display: flex; flex-direction: column; gap: 20px; padding: 20px;
            overflow-y: auto; height: calc(100vh - 80px);
        }

        /* Desktop Layout Override */
        @media (min-width: 992px) {
            .workspace { display: grid; grid-template-columns: 1fr 360px; padding: 30px; }
        }

        /* --- THE MAIN PILL TERMINAL --- */
        .main-terminal {
            background: var(--pill-dark); border-radius: 35px; padding: 25px;
            border: 2px solid var(--neon-lime); box-shadow: 0 0 25px rgba(57, 255, 20, 0.15);
        }

        .terminal-header {
            color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
            font-size: 11px; letter-spacing: 2px; margin-bottom: 25px; text-align: center;
        }

        /* RESPONSIVE FORM GRID */
        .form-row { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .form-row { grid-template-columns: 1fr 1fr; } }

        label { color: var(--neon-blue); font-size: 9px; margin-left: 15px; margin-bottom: 5px; display: block; }
        
        select, input {
            width: 100%; padding: 14px 22px; background: #000; border: 1px solid #222;
            border-radius: 50px; color: var(--neon-yellow); outline: none; font-size: 14px;
        }

        .btn-execute {
            width: 100%; padding: 18px; border-radius: 50px; background: var(--neon-lime);
            color: black; font-weight: 900; font-family: 'Orbitron', sans-serif;
            border: none; cursor: pointer; box-shadow: 0 0 20px var(--neon-lime);
            margin-top: 15px; font-size: 12px;
        }

        /* --- SIDEBAR COMPONENTS --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .settings-pill-box {
            background: var(--pill-dark); border-radius: 30px; padding: 20px;
            border: 1px solid #222;
        }

        .balance-display {
            font-size: 24px; font-weight: 900; color: white;
            text-shadow: 0 0 10px var(--neon-blue); margin-top: 5px;
        }

        .account-item {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #1a1a1a; color: #888; font-size: 11px;
        }
        .account-item span { color: var(--neon-blue); }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="nav-pill">Dashboard</div>
        <div class="nav-pill">Bot Editor</div>
        <div class="nav-pill active">Speedbot</div>
        <div class="nav-pill">Forex Bot</div>
    </nav>

    <div class="workspace">
        <div class="main-terminal">
            <div class="terminal-header">DBAUTOMATERS ENGINE</div>
            
            <div class="form-row">
                <div>
                    <label>MARKET</label>
                    <select id="market">
                        <option value="1HZ10V">Volatility 10 (1s)</option>
                        <option value="R_75">Volatility 75 Index</option>
                    </select>
                </div>
                <div>
                    <label>CONTRACT</label>
                    <select id="contract">
                        <option value="DIGITEVEN">Even</option>
                        <option value="DIGITODD">Odd</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div><label>TICKS</label><input type="number" id="ticks" value="1"></div>
                <div><label>STAKE (USD)</label><input type="number" id="stake" value="0.35"></div>
            </div>

            <button class="btn-execute" onclick="launchBot()">INITIALIZE TRADE</button>
            <div id="log" style="color:var(--neon-lime); font-family:monospace; font-size:10px; margin-top:20px; height: 60px; overflow: hidden;">
                > [SYSTEM] Waiting for Input...
            </div>
        </div>

        <div class="sidebar">
            <div class="settings-pill-box" style="border-color: var(--neon-blue);">
                <div style="color: var(--neon-yellow); font-size: 10px; font-weight: 900;">LIVE EQUITY</div>
                <div class="balance-display" id="balance">0.00 USD</div>
            </div>

            <div class="settings-pill-box">
                <div class="account-item">2FA <span>ACTIVE</span></div>
                <div class="account-item" style="border:none">Session <span>STABLE</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };
        initializeApp(firebaseConfig);

        const TOKEN = 'Kc9DWs8mdnEQRri'; 
        let ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');

        ws.onopen = () => ws.send(JSON.stringify({ authorize: TOKEN }));
        ws.onmessage = (msg) => {
            const res = JSON.parse(msg.data);
            if (res.msg_type === 'authorize') {
                document.getElementById('balance').innerText = res.authorize.balance + " USD";
            }
        };

        window.launchBot = () => {
            const stake = document.getElementById('stake').value;
            ws.send(JSON.stringify({
                buy: 1, price: parseFloat(stake),
                parameters: {
                    amount: parseFloat(stake), basis: 'stake',
                    contract_type: document.getElementById('contract').value,
                    currency: 'USD', duration: parseInt(document.getElementById('ticks').value),
                    duration_unit: 't', symbol: document.getElementById('market').value
                }
            }));
            document.getElementById('log').innerHTML = "> [NODE] Trade Injected...";
        };
    </script>
</body>
</html>
