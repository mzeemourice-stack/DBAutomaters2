<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBAutomaters Terminal | EA Access</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --neon-green: #39ff14; 
            --neon-blue: #00d2ff; 
            --neon-yellow: #fefe00;
            --dark-bg: #050505;
        }

        body { 
            margin: 0; background: var(--dark-bg); color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Top Header */
        .header { 
            height: 70px; background: #000; border-bottom: 1px solid #222; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px; 
        }

        /* THE YELLOW GLOWING PILL */
        .brand-pill {
            padding: 8px 20px;
            border: 2px solid var(--neon-yellow);
            border-radius: 50px;
            color: var(--neon-yellow);
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(254, 254, 0, 0.05);
            box-shadow: 0 0 15px rgba(254, 254, 0, 0.4);
            animation: hoverAnim 3s infinite ease-in-out;
        }

        @keyframes hoverAnim {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 15px rgba(254, 254, 0, 0.4); }
            50% { transform: translateY(-5px); box-shadow: 0 0 25px rgba(254, 254, 0, 0.7); }
        }

        .user-stats { display: flex; align-items: center; gap: 20px; }
        .balance-box { color: var(--neon-blue); font-weight: bold; font-size: 1.1rem; }

        /* Main Workspace */
        .workspace { display: flex; flex: 1; }

        /* Sidebar */
        .sidebar { 
            width: 320px; background: #0a0a0a; border-right: 1px solid #222; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
        }

        .card { 
            background: #111; border: 1px solid #222; padding: 18px; border-radius: 15px; 
            transition: 0.3s;
        }
        .card:hover { border-color: #444; }
        .card h4 { margin: 0 0 10px 0; font-size: 0.75rem; color: #888; text-transform: uppercase; }

        .btn { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; 
        }
        .btn-green { background: var(--neon-green); color: black; }
        .btn-blue { background: var(--neon-blue); color: black; }
        .btn-outline { background: transparent; border: 1px solid #333; color: white; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Chart Area */
        .chart-container { flex: 1; padding: 15px; background: #000; }
        #tv_widget { 
            width: 100%; height: 550px; /* Non-fullscreen height */
            border-radius: 12px; border: 1px solid #222; overflow: hidden; 
        }

        .status-tag { 
            font-size: 0.65rem; padding: 4px 10px; border-radius: 4px; 
            margin-top: 10px; display: inline-block; font-weight: bold;
        }
        .off { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid #ff4444; }
        .on { background: rgba(57,255,20,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-pill">DB EA TERMINAL</div>
        <div class="user-stats">
            <div class="balance-box" id="walletBal">Balance: $0.00</div>
            <button onclick="logout()" class="btn-outline" style="padding: 6px 15px; font-size: 0.7rem;">Sign Out</button>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <div class="card">
                <h4>Funds Management</h4>
                <button class="btn btn-green" onclick="deposit()">Deposit Funds</button>
                <button class="btn btn-outline" onclick="withdraw()">Withdrawal</button>
            </div>

            <div class="card">
                <h4>Institutional EA</h4>
                <p style="font-size: 0.7rem; color: #666;">Fee: <b>$2.50 / 7 Days</b></p>
                <button class="btn btn-blue" onclick="payForEA()">Activate Paid EA</button>
                <div id="eaStatus" class="status-tag off">EA INACTIVE</div>
            </div>

            <div class="card">
                <h4>Practice Mode</h4>
                <button class="btn btn-outline" onclick="startDemo()">Run Demo EA</button>
            </div>
        </div>

        <div class="chart-container">
            <div id="tv_widget"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyABhnkxmw_S5VamB0wJVRB1MUTOI4_Tc9s",
            authDomain: "dbautomaters.firebaseapp.com",
            projectId: "dbautomaters",
            storageBucket: "dbautomaters.firebasestorage.app",
            messagingSenderId: "979994954651",
            appId: "1:979994954651:web:476730aa83893ed7716f3e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Load Chart
        function initChart() {
            new TradingView.widget({
                "width": "100%",
                "height": 550,
                "symbol": "FX:EURUSD",
                "interval": "60",
                "theme": "dark",
                "style": "1",
                "container_id": "tv_widget",
                "allow_symbol_change": true,
                "details": true
            });
        }

        // Auth Listener & Data Sync
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                initChart();
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('walletBal').innerText = `Balance: $${data.balance.toFixed(2)}`;
                        if(data.ea_active) {
                            const tag = document.getElementById('eaStatus');
                            tag.innerText = "EA ACTIVE";
                            tag.className = "status-tag on";
                        }
                    } else {
                        db.collection("users").doc(user.uid).set({ balance: 0.00, ea_active: false });
                    }
                });
            }
        });

        async function payForEA() {
            const user = auth.currentUser;
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.data().balance >= 2.50) {
                if(confirm("Deduct $2.50 for 1 week of EA usage?")) {
                    alert("Activation request sent to server. Ensure MT5 is linked.");
                }
            } else {
                alert("Insufficient Funds. Min $2.50 required.");
            }
        }

        function deposit() { alert("Redirecting to Local Payment Gateway..."); }
        function logout() { auth.signOut().then(()=> window.location.href="index.html"); }
    </script>
</body>
</html>
