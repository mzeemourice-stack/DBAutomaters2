<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dbautomaters Trading</title>
  <style>
    /* ===== Dark Theme ===== */
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      padding: 15px 20px;
    }

    /* Dbautomaters name in pill shape */
    .logo {
      background: linear-gradient(to right, #ff0000, #0000ff);
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.2rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ===== Buttons ===== */
    .button {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      border-radius: 15px; /* Rounded edges */
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #ffff00; /* Yellow text */
      background-color: #0000ff; /* Blue background */
      box-shadow: 0 0 10px #0000ff;
    }

    .button:hover {
      box-shadow: 0 0 20px #ffff00;
      background-color: #1a1aff;
      color: #ffff00;
      border-color: #ffff00;
    }

    /* ===== Trading Container ===== */
    .trading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    .trade-section {
      background-color: #1e1e1e;
      border-radius: 15px;
      padding: 20px;
      margin: 15px;
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    .trade-section h2 {
      margin-bottom: 15px;
      color: #00ffff; /* Cyan headings for contrast */
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Dbautomaters</div>
  </header>

  <div class="trading-container">
    
    <div class="trade-section">
      <h2>Deriv Trade</h2>
      <button class="button">Buy</button>
      <button class="button">Sell</button>
      <button class="button">Stop Loss</button>
      <button class="button">Take Profit</button>
    </div>

    <div class="trade-section">
      <h2>Account Info</h2>
      <button class="button">Deposit</button>
      <button class="button">Withdraw</button>
      <button class="button">Balance</button>
    </div>

  </div>

</body>
</html>
