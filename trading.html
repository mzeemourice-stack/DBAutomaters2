<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB EA | Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon-yellow: #fefe00; --neon-lime: #39ff14; --neon-blue: #00d2ff; --dark-bg: #050505; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* BRANDED LOADER */
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-content { position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { width: 150px; height: 150px; border: 3px solid transparent; border-top: 3px solid var(--neon-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-brand { position: absolute; color: var(--neon-yellow); font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon-yellow); }
        .loading-text { margin-top: 30px; color: var(--neon-blue); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }
        .loading-text::after { content: "ACCESSING VOLATILITY MARKET..."; animation: textSwap 6s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes textSwap { 0%, 33% { content: "ACCESSING VOLATILITY MARKET..."; } 34%, 66% { content: "SYNCING ALGORITHMIC NODES..."; } 67%, 100% { content: "ESTABLISHING SECURE LINK..."; } }

        /* UI LAYOUT */
        .header { height: 90px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: #000; }
        .workspace { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .terminal-main { flex: 1; background: #000; border: 1px solid #222; border-radius: 20px; padding: 25px; display: flex; flex-direction: column; }
        .sidebar { width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 20px; border-left: 4px solid var(--neon-lime); }
        
        /* PARAMETERS */
        .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-blue { background: var(--neon-blue); color: black; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .btn-lime { background: var(--neon-lime); color: black; }
        
        /* TOGGLE STYLES */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon-lime); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div id="loader-overlay"><div class="loader-content"><div class="ring"></div><div class="loader-brand">DB EA</div></div><div class="loading-text"></div></div>

    <div class="header">
        <div style="padding: 10px 25px; border: 2px solid var(--neon-yellow); border-radius: 50px; color: var(--neon-yellow); font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;">DB EA TERMINAL</div>
        <div style="display: flex; gap: 25px; align-items: center;">
            <div style="text-align: right;"><div style="font-size: 0.6rem; color: #555;">SESSION PROFIT</div><div id="session-profit" style="color: var(--neon-lime); font-weight: 900; font-size: 1.2rem;">+$0.00</div></div>
            <div style="text-align: right;"><div style="font-size: 0.6rem; color: #555;">WALLET</div><div id="user-balance" style="color: var(--neon-blue); font-weight: 900; font-size: 1.2rem;">$0.00</div></div>
        </div>
    </div>

    <div class="workspace">
        <div class="terminal-main">
            <h4 style="text-transform: uppercase; font-size: 0.7rem; color: #555; border-bottom: 1px solid #222; padding-bottom: 10px;">Speedbot Configuration</h4>
            <div style="margin-top: 15px;"><label style="font-size: 0.6rem; color: #888;">SELECT MARKET</label><select><option>Volatility 75 Index</option><option>Volatility 100 (1s) Index</option></select></div>
            <div class="params-grid">
                <div><label style="font-size: 0.6rem;">Ticks</label><input type="number" value="1"></div>
                <div><label style="font-size: 0.6rem;">Stake (USD)</label><input type="number" value="0.50"></div>
            </div>
            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px; font-size: 0.7rem;"><label class="switch"><input type="checkbox"><span class="slider"></span></label> Alternate Even/Odd</div>
                <div style="display: flex; align-items: center; gap: 10px; font-size: 0.7rem;"><label class="switch"><input type="checkbox" checked><span class="slider"></span></label> Enable Martingale</div>
            </div>
            <button class="btn btn-blue">START AI SPEEDBOT</button>
            <div id="log" style="margin-top: 20px; flex: 1; background: #050505; padding: 15px; border-radius: 10px; font-family: monospace; color: var(--neon-lime); font-size: 0.8rem; overflow-y: auto;">[SYSTEM] Initializing nodes...</div>
        </div>

        <div class="sidebar">
            <div class="card"><h4>Subscription</h4><button class="btn btn-lime" onclick="activateEA()">Activate for $2.50</button></div>
            <div class="card" style="border-left-color: var(--neon-blue);"><h4>Account Sync</h4><input type="text" placeholder="CR Number / MT5 ID"><input type="password" placeholder="Password"><button class="btn btn-blue">Link Account</button></div>
        </div>
    </div>

    <script>
        // Loader timeout
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loader-overlay').style.display='none', 3000));
        
        // Trading Logic Bridge
        function activateEA() {
            // This is where you connect the START button to the Deriv WebSocket API
            document.getElementById('log').innerHTML += "<div>[NETWORK] Attempting Deriv connection...</div>";
        }
    </script>
</body>
</html>
